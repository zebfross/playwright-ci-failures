name: Publish extension

# Publishes to the VS Code Marketplace whenever a version tag (vX.Y.Z) is pushed,
# and attaches the .vsix to a GitHub release.
#
# Requires a repo secret VSCE_PAT (Azure DevOps Personal Access Token with
# Marketplace > Manage scope). Optional: OVSX_PAT for Open VSX (uncomment below).
#
# Release flow:
#   npm version patch        # bumps package.json + commits + tags vX.Y.Z
#   git push --follow-tags   # pushes the commit and the tag -> triggers this

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # to create the GitHub release + upload the .vsix

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Package
        run: npm run package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish

      # - name: Publish to Open VSX
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   run: npx ovsx publish *.vsix

      - name: Attach .vsix to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
